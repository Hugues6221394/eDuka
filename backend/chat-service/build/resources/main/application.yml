server:
  port: 8085

spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:postgresql://localhost:5433/inzozi_space?currentSchema=public
    username: postgres
    password: ${DB_PASSWORD:trigga}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

logging:
  level:
    com.inzozi.chat: DEBUG
    org.springframework.web.socket: DEBUG
