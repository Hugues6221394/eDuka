server:
  port: 8085

spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:postgresql://localhost:5433/inzozi_space?currentSchema=public
    username: postgres
    password: ${DB_PASSWORD:trigga}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: always

logging:
  level:
    com.inzozi.chat: DEBUG
    org.springframework.web.socket: DEBUG

inzozi:
  internal-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}
  user-service-url: ${USER_SERVICE_URL:http://localhost:8082}

chat:
  ws:
    secret: ${CHAT_WS_SECRET:dev-chat-ws-secret}
    allowed-origins: ${CHAT_WS_ALLOWED_ORIGINS:http://localhost:8082}
