server:
  port: 8086

spring:
  application:
    name: analytics-service

  datasource:
    url: jdbc:postgresql://localhost:5432/inzozi_space
    username: postgres
    password: ${DB_PASSWORD:trigga}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# AI Service Configuration
ai-service:
  url: http://localhost:8000
  connect-timeout: 5000
  read-timeout: 30000

logging:
  level:
    com.inzozi.analytics: DEBUG

inzozi:
  internal-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}
