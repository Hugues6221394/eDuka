server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: api-gateway

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  # Actuator
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:InzoziSpaceSecretKeyForProductionChangeThis2024}
  expiration: 86400000
  refresh-expiration: 604800000

# Service URLs - corrected to match actual service ports
services:
  user:
    url: http://localhost:8082
    path: /api/internal/users
  business:
    url: http://localhost:8082
    path: /api/internal/businesses
  product:
    url: http://localhost:8082
    path: /api/internal/products
  booking:
    url: http://localhost:8082
    path: /api/internal/bookings
  chat:
    url: http://localhost:8085
    path: /internal/chats
  analytics:
    url: http://localhost:8086
    path: /internal/analytics
  ai:
    url: http://localhost:8000
    path: /ai

# Rate Limiting
rate-limit:
  enabled: true
  requests-per-minute: 100
  requests-per-minute-per-ip: 1000

# CORS Configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8082
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# Logging
logging:
  level:
    com.inzozi.gateway: INFO
    org.springframework.security: WARN
    org.springframework.web: INFO

inzozi:
  internal-token: ${INTERNAL_SERVICE_TOKEN:dev-internal-token}
